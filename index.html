<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>P4 デバフ判定</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2333; --border:#2a3244;
    --true:#3b82f6; --true-dark:#173261; --false:#ef4444; --false-dark:#521717;
    --accent:#f5b700; --text:#e6edf3; --sub:#8a97a8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
    min-height:100%;overscroll-behavior:none;}
  #app{max-width:900px;margin:0 auto;
    padding:max(20px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right))
            max(28px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));}

  .gcrow{display:flex;align-items:stretch;gap:8px;margin-bottom:10px;}
  .gclabel{writing-mode:vertical-rl;text-orientation:upright;font-size:13px;font-weight:800;
    color:var(--accent);display:flex;align-items:center;justify-content:center;
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:6px 2px;min-width:34px;}
  .gcbody{flex:1;display:flex;flex-direction:column;gap:8px;}
  .truthrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .tbtn{border:2px solid var(--border);border-radius:14px;padding:14px 6px;font-size:19px;font-weight:900;
    color:var(--sub);background:var(--panel);cursor:pointer;text-align:center;line-height:1.2;}
  .tbtn small{display:block;font-size:11px;font-weight:600;margin-top:2px;}
  .tbtn.t.on{background:linear-gradient(180deg,var(--true),var(--true-dark));color:#fff;border-color:var(--true);}
  .tbtn.f.on{background:linear-gradient(180deg,var(--false),var(--false-dark));color:#fff;border-color:var(--false);}
  .tbtn:active{transform:scale(.97);}
  .iconrow{display:flex;gap:10px;align-items:stretch;flex-wrap:wrap;}
  .pairgroup{display:flex;gap:6px;flex:2 1 150px;border:2px dashed #3d485e;border-radius:16px;padding:5px;position:relative;}
  .pairgroup::before{content:attr(data-label);position:absolute;top:-9px;left:12px;background:var(--bg);
    color:var(--sub);font-size:10px;font-weight:700;padding:0 6px;border-radius:6px;}
  .pairgroup .ibtn{flex:1;}
  .iconrow > .ibtn{flex:1;}
  .ibtn{border:2px solid var(--border);border-radius:14px;background:var(--panel);cursor:pointer;
    padding:10px 4px 8px;text-align:center;color:var(--sub);}
  .ibtn.none .emoji{font-size:26px;padding-top:6px;}
  .ibtn.none.on{border-color:#64748b;background:#242c38;color:#c3ccd8;}
  .ibtn.none.on .emoji{filter:none;}
  .ibtn.dis{opacity:.35;} /* 薄表示のみ。タップ可能で、押すと競合側が自動解除される */
  .ibtn .emoji{font-size:34px;display:block;line-height:1.1;filter:grayscale(1) opacity(.55);}
  .ibtn .nm{font-size:11px;font-weight:700;display:block;margin-top:4px;line-height:1.2;}
  .ibtn.on{border-color:var(--accent);background:#2a2410;color:var(--accent);}
  .ibtn.on .emoji{filter:none;}
  .ibtn:active{transform:scale(.95);}

  .results{margin-top:6px;}
  .rcard{border-radius:16px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;
    border:2px solid var(--border);}
  .rcard.tr{background:linear-gradient(90deg,#16294d 0%,#101826 100%);border-color:#2a4d8f;}
  .rcard.fa{background:linear-gradient(90deg,#471616 0%,#1a1010 100%);border-color:#8f2a2a;}
  .rcard .remoji{font-size:36px;flex-shrink:0;}
  .rcard .rbody{flex:1;min-width:0;}
  .rcard .rmeta{font-size:11px;color:var(--sub);font-weight:700;}
  .rcard .raction{font-size:clamp(20px,4.5vw,30px);font-weight:900;color:#fff;line-height:1.25;}
  .rcard .rpill{font-size:11px;font-weight:800;padding:3px 10px;border-radius:12px;flex-shrink:0;}
  .rcard.tr .rpill{background:var(--true);color:#08152e;}
  .rcard.fa .rpill{background:var(--false);color:#2e0808;}
  .rempty{color:var(--sub);font-size:14px;text-align:center;padding:18px 0;border:1px dashed var(--border);border-radius:14px;}

  /* 加速度爆弾カード: 破線枠＋琥珀色で他デバフと区別 */
  .rcard.accel{border-style:dashed;border-width:3px;border-color:#d97706;}
  .rcard.accel.tr{background:linear-gradient(90deg,#2b2410 0%,#101826 100%);}
  .rcard.accel.fa{background:linear-gradient(90deg,#2b2410 0%,#1a1010 100%);}
  .rcard.accel .rmeta{color:#e8a33d;}

  /* 視線カード: デバフと明確に区別 */
  .rcard.gaze{border-style:double;border-width:5px;}
  .rcard.gaze.tr{background:#0e2038;}
  .rcard.gaze.fa{background:#2e0e0e;}
  .gnum{display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:56px;height:56px;border-radius:50%;flex-shrink:0;font-weight:900;line-height:1;
    background:#fff;color:#111;}
  .gnum .n{font-size:26px;}
  .gnum .k{font-size:10px;margin-top:1px;}
  .rcard.gaze.tr .gnum{background:#a8c8ff;color:#0a1c3d;}
  .rcard.gaze.fa .gnum{background:#ffb3b3;color:#3d0a0a;}
  /* 自分が視線役（叫声持ち）: 金枠で強調 */
  .rcard.gaze.role{border-color:var(--accent);}
  .rcard.gaze.role .rmeta{color:var(--accent);}

  .resetbtn{width:100%;margin-top:14px;border:none;border-radius:14px;padding:16px;
    font-size:17px;font-weight:900;background:var(--accent);color:#241a00;cursor:pointer;}
  .footer{color:var(--sub);font-size:10px;text-align:center;margin-top:14px;line-height:1.5;}
  .divider{height:1px;background:var(--border);margin:12px 0;}

  /* ---- レスポンシブ ---- */
  /* 縦画面スマホ（既定）: 入力 → 結果 → リセット の縦積み */
  .layout{display:grid;grid-template-areas:"inputs" "rescol" "resetw";grid-template-columns:1fr;}
  .inputs{grid-area:inputs;}
  .rescol{grid-area:rescol;}
  .resetwrap{grid-area:resetw;}

  /* 横画面タブレット: 左=入力 / 右=結果、画面全体を使う */
  @media (min-width:700px) and (orientation:landscape){
    #app{max-width:1250px;
      padding:max(26px, env(safe-area-inset-top)) max(28px, env(safe-area-inset-right))
              max(26px, env(safe-area-inset-bottom)) max(28px, env(safe-area-inset-left));}
    .layout{
      grid-template-areas:"inputs rescol" "resetw rescol";
      grid-template-columns:minmax(340px,460px) 1fr;
      grid-template-rows:1fr auto;
      gap:14px 28px;align-items:stretch;
      min-height:calc(100vh - 60px);
      min-height:calc(100dvh - 60px);
    }
    /* 入力側: ボタン自体を縦いっぱいに引き伸ばす */
    .inputs{display:flex;flex-direction:column;gap:16px;}
    .gcrow{flex:1;margin-bottom:0;}
    .gcbody{gap:12px;}
    .truthrow{flex:1;}
    .tbtn{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-size:24px;padding:10px 6px;}
    .tbtn small{font-size:13px;margin-top:4px;}
    .iconrow{flex:1.2;}
    .pairgroup{padding:6px;}
    .ibtn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;height:100%;}
    .ibtn .emoji{font-size:44px;}
    .ibtn .nm{font-size:13px;margin-top:6px;}
    .gclabel{font-size:15px;min-width:40px;}
    /* 結果側: 上から順にスタック。高さは常に「4枚でちょうど埋まる」サイズに固定 */
    .rescol{display:flex;flex-direction:column;}
    .rescol .divider{display:none;}
    .results{flex:1;display:flex;flex-direction:column;gap:12px;justify-content:flex-start;}
    .rcard{margin-bottom:0;padding:10px 22px;
      flex:0 0 calc(25% - 9px);min-height:0;box-sizing:border-box;}
    .rcard .remoji{font-size:46px;}
    .rcard .raction{font-size:clamp(28px,3.4vw,42px);}
    .rempty{flex:1;display:flex;align-items:center;justify-content:center;font-size:15px;}
    .resetbtn{margin-top:0;padding:18px;}
  }
  /* 幅の狭いスマホ: アイコンや文字を少し詰める */
  @media (max-width:430px){
    .ibtn .emoji{font-size:28px;}
    .ibtn .nm{font-size:10px;}
    .tbtn{font-size:17px;padding:12px 4px;}
    .rcard .remoji{font-size:30px;}
    .gclabel{min-width:30px;font-size:12px;}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

/* デバフ定義: t=本当のときの処理, f=嘘のときの処理 */
var DEB = {
  lightning: {emoji:"⚡", nm:"ライトニング", full:"フォークライトニング", t:"散開",     f:"頭割り",
              tSub:"1人で範囲AoEを受ける", fSub:"味方と重なる"},
  water:     {emoji:"💧", nm:"水圧縮",   full:"水属性圧縮",         t:"頭割り",   f:"散開",
              tSub:"味方と重なる", fSub:"1人で範囲AoEを受ける"},
  curse:     {emoji:"👁", nm:"叫声",     full:"呪詛の叫声"},
  accel:     {emoji:"💣", nm:"加速度",   full:"加速度爆弾",         t:"動かない", f:"動く",
              tSub:"その場で静止", fSub:"移動し続ける"}
};
var KEYS = ["lightning","water","accel"];

var state;
function reset(){
  state = {
    gc1:null, gc1d:{lightning:false,water:false,curse:false,accel:false,none:false},
    gc2:null, gc2d:{lightning:false,water:false,curse:false,accel:false,none:false}
  };
  render();
}

function setTruth(gc,val){
  state[gc] = (state[gc]===val) ? null : val; /* 再タップで解除 */
  render();
}
function toggleDeb(dkey,k){
  var d = state[dkey];
  var o = state[dkey==="gc1d" ? "gc2d" : "gc1d"];
  d[k] = !d[k];
  if(d[k]){
    /* 水雷グループ（⚡💧）と視線グループ（👁該当なし）は同一GC内で排他 */
    if(k==="lightning"){ d.water=false; d.curse=false; d.none=false; }
    if(k==="water"){ d.lightning=false; d.curse=false; d.none=false; }
    if(k==="curse"){ d.none=false; d.lightning=false; d.water=false; }
    if(k==="none"){ d.curse=false; d.lightning=false; d.water=false; }
    /* 相手GC側の競合する選択も自動解除（押し直しの手間をなくす） */
    if(k==="accel"){ o.accel=false; }
    if(k==="lightning"||k==="water"){ o.lightning=false; o.water=false; }
    if(k==="curse"||k==="none"){ o.curse=false; o.none=false; }
  }
  render();
}
function gcSection(label, truthKey, debKey){
  var t = state[truthKey];
  /* 同種デバフはGC1/GC2のどちらか一方にしかつかない → 相手側で選択済みなら無効化 */
  var other = state[debKey==="gc1d" ? "gc2d" : "gc1d"];
  var html = '<div class="gcrow">';
  html += '<div class="gclabel">'+label+'</div>';
  html += '<div class="gcbody">';
  html += '<div class="truthrow">'
    + '<button class="tbtn t'+(t==="true"?" on":"")+'" onclick="setTruth(\''+truthKey+'\',\'true\')">本当<small>青い球</small></button>'
    + '<button class="tbtn f'+(t==="false"?" on":"")+'" onclick="setTruth(\''+truthKey+'\',\'false\')">嘘<small>赤い？</small></button>'
    + '</div>';
  function ibtn(k){
    var on=state[debKey][k], d=DEB[k];
    /* 同種は片方のGCにしかつかない: 水雷⇔視線グループはGC間で必ず入れ替わる */
    var dis;
    if(k==="accel") dis = other.accel;
    else if(k==="lightning"||k==="water") dis = other.lightning || other.water;
    else dis = other.curse || other.none; /* curse, none */
    var inner = (k==="none")
      ? '<span class="emoji">－</span><span class="nm">該当なし</span>'
      : '<span class="emoji">'+d.emoji+'</span><span class="nm">'+d.nm+'</span>';
    return '<button class="ibtn'+(k==="none"?" none":"")+(on?" on":"")+(dis?" dis":"")
      +'" onclick="toggleDeb(\''+debKey+'\',\''+k+'\')">'+inner+'</button>';
  }
  html += '<div class="iconrow">'
    + '<div class="pairgroup" data-label="水雷グループ">'+ibtn("lightning")+ibtn("water")+'</div>'
    + '<div class="pairgroup" data-label="視線グループ">'+ibtn("curse")+ibtn("none")+'</div>'
    + ibtn("accel");
  html += '</div></div></div>';
  return html;
}

function buildItems(){
  var items=[];
  function add(num, truth, debObj){
    if(truth===null) return;
    for(var i=0;i<KEYS.length;i++){
      var k=KEYS[i];
      if(debObj[k]){
        var d=DEB[k];
        items.push({
          emoji:d.emoji, meta:d.full, truth:truth, accel:(k==="accel"),
          action: truth==="true"?d.t:d.f,
          sub: truth==="true"?d.tSub:d.fSub
        });
      }
    }
    /* 視線はGCの真偽から自動判定（GC1→1回目、GC2→2回目）。叫声持ちは視線役 */
    var role = debObj.curse;
    items.push({
      gaze:true, role:role, num:num,
      meta: role ? "視線【自分が視線役】" : "視線",
      truth:truth,
      action: truth==="true"?"見ない":"見る",
      sub: role
        ? (truth==="true"?"中央へ・外を向く":"中央へ・相方の視線役を見る")
        : (truth==="true"?"視線から外を向く":"視線役の方を見る")
    });
  }
  add("1", state.gc1, state.gc1d);
  add("2", state.gc2, state.gc2d);
  return items;
}

function render(){
  var html='<div class="layout">';

  /* 入力エリア */
  html += '<div class="inputs">';
  html += gcSection("ＧＣ１","gc1","gc1d");
  html += gcSection("ＧＣ２","gc2","gc2d");
  html += '</div>';

  /* 結果エリア */
  var items = buildItems();
  html += '<div class="rescol"><div class="divider"></div><div class="results">';
  if(items.length===0){
    html += '<div class="rempty">真偽＋デバフをタップすると、ここに処理が大きく表示されます</div>';
  } else {
    for(var i=0;i<items.length;i++){
      var it=items[i];
      var lead = it.gaze
        ? '<span class="gnum"><span class="n">'+it.num+'</span><span class="k">回目</span></span><span class="remoji">👁</span>'
        : '<span class="remoji">'+it.emoji+'</span>';
      html += '<div class="rcard '+(it.gaze?'gaze ':'')+(it.role?'role ':'')+(it.accel?'accel ':'')+(it.truth==="true"?"tr":"fa")+'">'
        + lead
        + '<div class="rbody">'
        + '<div class="rmeta">'+it.meta+'　<span style="opacity:.7">'+it.sub+'</span></div>'
        + '<div class="raction">'+it.action+'</div>'
        + '</div>'
        + '<span class="rpill">'+(it.truth==="true"?"本当":"嘘")+'</span>'
        + '</div>';
    }
  }
  html += '</div></div>';

  html += '<div class="resetwrap"><button class="resetbtn" onclick="reset()">リセット（次の周回へ）</button></div>';
  html += '</div>'; /* /layout */

  document.getElementById('app').innerHTML = html;
}

reset();
</script>
</body>
</html>
